name: sloopquest

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    image: ${API_IMAGE:-sloopquest-api:local}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_ENDPOINT: db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: ${API_IMAGE:-sloopquest-api:local}
    restart: unless-stopped
    command: ["./scripts/start-worker.sh"]
    stop_grace_period: 60s
    env_file: .env
    environment:
      DB_ENDPOINT: db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:
