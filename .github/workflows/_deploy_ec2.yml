name: Deploy to EC2 (Reusable)

on:
  workflow_call:
    inputs:
      instance_id:
        description: "EC2 instance ID (from terraform output)"
        required: true
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run deploy script via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/opt/sloopquest/deploy.sh"]' \
            --timeout-seconds 300 \
            --comment "Deployed from GitHub Actions run ${{ github.run_id }}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM command ID: ${COMMAND_ID}"

          # Poll until the command finishes (30 × 10s = 5 min max)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ inputs.instance_id }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/30] Status: ${STATUS}"

            if [ "$STATUS" = "Success" ]; then
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Deploy command ${STATUS}"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ inputs.instance_id }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

      - name: Show deploy output
        if: always() && steps.ssm.outputs.command_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ inputs.instance_id }}" \
            --query '{Status:Status,Output:StandardOutputContent}' \
            --output table
